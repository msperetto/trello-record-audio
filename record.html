<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>

<body>
    <div class="container">
        <div id="status" class="status-text">Click to start recording</div>
        <button id="record-btn" class="record-btn-large">
            <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
                fill="currentColor">
                <path
                    d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z" />
            </svg>
        </button>
        <div id="audio-preview-container" style="display: none; margin-top: 15px;">
            <audio id="audio-preview" controls></audio>
            <div style="margin-top:10px;">
                <button id="save-btn">Upload to Card</button>
                <button id="discard-btn" class="danger">Discard</button>
            </div>
        </div>
    </div>
    <script src="./js/record.js"></script>
</body>

</html>
