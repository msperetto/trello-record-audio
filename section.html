<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body {
            background: transparent;
            padding: 0 4px 4px 4px;
            margin: 0;
        }

        .empty-state {
            display: none;
            /* hidden — section won't load at all if empty, but just in case */
        }

        .audio-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            background: #F0F2F5;
            border-radius: 20px;
            padding: 7px 12px 7px 7px;
            margin-bottom: 6px;
        }

        /* Compact circular play/pause button */
        .play-btn {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 50%;
            background: #0052CC;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            padding: 0;
        }

        .play-btn:hover {
            background: #0065FF;
        }

        .play-btn.playing {
            background: #EB5A46;
        }

        /* SVG sized to fit button comfortably */
        .play-btn svg {
            width: 14px;
            height: 14px;
            fill: white;
            flex-shrink: 0;
            margin-left: 2px;
            /* optical centering for play triangle */
        }

        .play-btn.playing svg {
            margin-left: 0;
        }

        /* Right side: progress + meta stacked vertically */
        .audio-waveform {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden;
            min-width: 0;
        }

        .progress-track {
            width: 100%;
            height: 3px;
            background: #D0D4E0;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #0052CC;
            border-radius: 2px;
            width: 0%;
        }

        .audio-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .audio-duration {
            font-size: 10px;
            color: #5E6C84;
            font-variant-numeric: tabular-nums;
        }

        .audio-label {
            font-size: 10px;
            color: #8C8C9E;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 140px;
        }

        .hidden-audio {
            display: none;
        }
    </style>
</head>

<body>
    <div id="audio-list"></div>
    <script src="./js/section.js"></script>
</body>

</html>
