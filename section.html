<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        body {
            background: transparent;
            padding: 0 8px 8px 8px;
        }

        .empty-state {
            color: #8C8C9E;
            font-size: 13px;
            padding: 8px 0;
        }

        .audio-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #F0F2F5;
            border-radius: 18px;
            padding: 10px 14px;
            margin-bottom: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .play-btn {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 50%;
            background: #0052CC;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .play-btn:hover {
            background: #0065FF;
        }

        .play-btn.playing {
            background: #EB5A46;
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: white;
            margin-left: 2px;
            /* optical centering for play icon */
        }

        .play-btn.playing svg {
            margin-left: 0;
        }

        .audio-waveform {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow: hidden;
        }

        .progress-track {
            width: 100%;
            height: 3px;
            background: #D0D4E0;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: #0052CC;
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .audio-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .audio-duration {
            font-size: 11px;
            color: #5E6C84;
            font-variant-numeric: tabular-nums;
        }

        .audio-label {
            font-size: 11px;
            color: #5E6C84;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 120px;
        }

        .hidden-audio {
            display: none;
        }
    </style>
</head>

<body>
    <div id="audio-list"></div>
    <script src="./js/section.js"></script>
</body>

</html>
